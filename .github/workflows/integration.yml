name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

jobs:
  integration-test:
    name: Dynatrace Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Run unit tests
        run: go test -v -short ./...

      - name: Run integration tests
        env:
          DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
          DT_PLATFORM_URL: ${{ secrets.DT_PLATFORM_URL }}
          DT_PLATFORM_TOKEN: ${{ secrets.DT_PLATFORM_TOKEN }}
        run: |
          if [ -z "$DT_ENDPOINT" ] || [ -z "$DT_API_TOKEN" ]; then
            echo "Skipping integration tests: secrets not configured"
            exit 0
          fi
          go test -v -timeout 10m ./test/integration/...
