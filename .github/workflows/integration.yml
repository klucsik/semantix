name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

jobs:
  integration-test:
    name: Dynatrace Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Run unit tests
        run: go test -v -short ./...

      - name: Run integration tests
        env:
          DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
          DT_PLATFORM_URL: ${{ secrets.DT_PLATFORM_URL }}
          DT_PLATFORM_TOKEN: ${{ secrets.DT_PLATFORM_TOKEN }}
        run: |
          if [ -z "$DT_ENDPOINT" ] || [ -z "$DT_API_TOKEN" ]; then
            echo "Skipping integration tests: secrets not configured"
            exit 0
          fi
          go test -v -timeout 10m ./test/integration/...

  e2e-test:
    name: Dashboard E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: test/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: test/e2e
        run: npm test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 7
