name: Deploy to GCE

on:
  workflow_run:
    workflows: ["Integration Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  INSTANCE_NAME: semantix
  MACHINE_TYPE: e2-micro
  IMAGE_NAME: semantix
  STATIC_IP_NAME: semantix-ip

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if the triggering workflow succeeded (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v0.0.0-$(git rev-parse --short HEAD)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push container image
        run: |
          docker build \
            -t "gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" \
            -t "gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest" \
            --build-arg "VERSION=${{ steps.version.outputs.version }}" \
            .
          
          docker push "gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          docker push "gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest"

      - name: Ensure static IP exists
        id: static_ip
        run: |
          REGION="${{ secrets.GCP_ZONE }}"
          if [ -z "$REGION" ]; then
            REGION="us-central1-a"
          fi
          # Extract region from zone (e.g., us-central1-a -> us-central1)
          REGION="${REGION%-*}"
          
          # Check if static IP exists, create if not
          if ! gcloud compute addresses describe "${{ env.STATIC_IP_NAME }}" \
              --region="$REGION" \
              --project="${{ secrets.GCP_PROJECT_ID }}" &>/dev/null; then
            echo "Creating static IP..."
            gcloud compute addresses create "${{ env.STATIC_IP_NAME }}" \
              --region="$REGION" \
              --project="${{ secrets.GCP_PROJECT_ID }}"
          fi
          
          # Get the static IP address
          STATIC_IP=$(gcloud compute addresses describe "${{ env.STATIC_IP_NAME }}" \
            --region="$REGION" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="get(address)")
          
          echo "static_ip=$STATIC_IP" >> $GITHUB_OUTPUT
          echo "region=$REGION" >> $GITHUB_OUTPUT
          echo "Static IP: $STATIC_IP"

      - name: Deploy to GCE
        run: |
          ZONE="${{ secrets.GCP_ZONE }}"
          if [ -z "$ZONE" ]; then
            ZONE="us-central1-a"
          fi
          
          # Check if instance exists
          if gcloud compute instances describe "${{ env.INSTANCE_NAME }}" \
              --zone="$ZONE" \
              --project="${{ secrets.GCP_PROJECT_ID }}" &>/dev/null; then
            echo "Instance exists, updating container..."
            
            # Update the container image on existing instance
            gcloud compute instances update-container "${{ env.INSTANCE_NAME }}" \
              --zone="$ZONE" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --container-image="gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" \
              --container-env="DT_ENDPOINT=${{ secrets.DT_ENDPOINT }},DT_API_TOKEN=${{ secrets.DT_API_TOKEN }},VERSION=${{ steps.version.outputs.version }}"
          else
            echo "Creating new instance with static IP..."
            
            # Create new instance with Container-Optimized OS and static IP
            gcloud compute instances create-with-container "${{ env.INSTANCE_NAME }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --zone="$ZONE" \
              --machine-type="${{ env.MACHINE_TYPE }}" \
              --image-family="cos-stable" \
              --image-project="cos-cloud" \
              --boot-disk-size="10GB" \
              --boot-disk-type="pd-standard" \
              --container-image="gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" \
              --container-env="DT_ENDPOINT=${{ secrets.DT_ENDPOINT }},DT_API_TOKEN=${{ secrets.DT_API_TOKEN }},VERSION=${{ steps.version.outputs.version }}" \
              --container-restart-policy="always" \
              --tags="http-server" \
              --address="${{ steps.static_ip.outputs.static_ip }}" \
              --scopes="https://www.googleapis.com/auth/devstorage.read_only,https://www.googleapis.com/auth/logging.write,https://www.googleapis.com/auth/monitoring.write"
            
            # Create firewall rule if it doesn't exist
            if ! gcloud compute firewall-rules describe allow-semantix-http \
                --project="${{ secrets.GCP_PROJECT_ID }}" &>/dev/null; then
              gcloud compute firewall-rules create allow-semantix-http \
                --project="${{ secrets.GCP_PROJECT_ID }}" \
                --allow="tcp:8080" \
                --target-tags="http-server" \
                --description="Allow HTTP access to Semantix dashboard"
            fi
          fi

      - name: Get instance IP and verify
        id: verify
        run: |
          # Use the static IP
          EXTERNAL_IP="${{ steps.static_ip.outputs.static_ip }}"
          
          echo "external_ip=$EXTERNAL_IP" >> $GITHUB_OUTPUT
          echo "Dashboard URL: http://$EXTERNAL_IP:8080"
          
          # Wait for container to start
          echo "Waiting for container to start..."
          sleep 30
          
          # Health check
          echo "Checking health endpoint..."
          for i in {1..5}; do
            if curl -sf "http://$EXTERNAL_IP:8080/health" --max-time 10; then
              echo ""
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance**: ${{ env.INSTANCE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard**: http://${{ steps.verify.outputs.external_ip }}:8080" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This IP is static and will not change between deployments." >> $GITHUB_STEP_SUMMARY
