# Cloud Build configuration for Semantix
# Usage: gcloud builds submit --config cloudbuild.yaml

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/semantix:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/semantix:latest'
      - '--build-arg'
      - 'VERSION=$COMMIT_SHA'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/semantix:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/semantix:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'semantix'
      - '--image'
      - 'gcr.io/$PROJECT_ID/semantix:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '1'
      - '--no-cpu-throttling'
      - '--no-allow-unauthenticated'
      - '--set-env-vars'
      - 'DT_ENDPOINT=${_DT_ENDPOINT}'
      - '--set-secrets'
      - 'DT_API_TOKEN=dynatrace-api-token:latest'

substitutions:
  _REGION: us-central1
  _DT_ENDPOINT: https://YOUR_ENV.live.dynatrace.com/api/v2/otlp

images:
  - 'gcr.io/$PROJECT_ID/semantix:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/semantix:latest'

options:
  logging: CLOUD_LOGGING_ONLY
