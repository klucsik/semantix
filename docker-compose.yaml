version: '3.8'

services:
  semantix:
    build: .
    environment:
      - DT_ENDPOINT=${DT_ENDPOINT}
      - DT_API_TOKEN=${DT_API_TOKEN}
    volumes:
      # Mount custom configs (optional)
      - ./configs:/configs:ro
    restart: unless-stopped

  # Optional: Run multiple instances with different configs
  semantix-ecommerce:
    build: .
    environment:
      - DT_ENDPOINT=${DT_ENDPOINT}
      - DT_API_TOKEN=${DT_API_TOKEN}
    command: ["--config", "/configs/examples/ecommerce.yaml"]
    volumes:
      - ./configs:/configs:ro
    restart: unless-stopped
